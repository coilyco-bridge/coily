name: release

# Forgejo-canonical release pipeline. Triggers on push to main against
# the forgejo repo (forgejo.coilysiren.me/coilyco-bridge/coily). Cuts the
# tag + release on forgejo, then two formula-bump jobs pin the new
# tag+revision via forgejo Contents API.
#
# Brew now installs from the org-aligned centralized tap:
#   brew tap coilyco-bridge/tap https://forgejo.coilysiren.me/coilyco-bridge/homebrew-tap
#   brew install coilyco-bridge/tap/coily
#
# bump-tap-formula writes that central tap. The per-repo bump-formula
# (Formula/coily.rb in this repo) is kept fresh for one migration cycle
# as a fallback for the old direct-repo tap:
#   brew tap coilyco-bridge/coily https://forgejo.coilysiren.me/coilyco-bridge/coily
#   brew install coilyco-bridge/coily/coily
# Drop bump-formula + Formula/coily.rb next release cycle.
#
# main.Version is set at build time via ldflags by the Formula, so the
# git tag is the only version artifact.
#
# Shared composite actions live at coilysiren/agentic-os/actions/*.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: docker
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
      changelog: ${{ steps.tag.outputs.changelog }}
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: tag
        uses: coilysiren/agentic-os/actions/tag-bump@main
        with:
          default_bump: patch

      - id: create
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: coilysiren/agentic-os/actions/create-release@main
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-formula:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - id: rev
        shell: bash
        run: |
          set -euo pipefail
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: coilysiren/agentic-os/actions/bump-formula@main
        with:
          formula_path: Formula/coily.rb
          tag: ${{ needs.release.outputs.tag }}
          revision: ${{ steps.rev.outputs.revision }}
          forgejo_token: ${{ secrets.CI_RELEASE_TOKEN }}

  bump-tap-formula:
    # Centralized monorepo tap: rewrite Formula/coily.rb in the
    # org-aligned coilyco-bridge/homebrew-tap to pin the just-cut tag +
    # revision. Reuses the same composite action as bump-formula, but
    # points `repo` at the tap and overrides `url_template` to a literal
    # so the pinned url still targets this source repo (not the tap).
    # Cross-repo write, so it uses CI_RELEASE_TOKEN (write:repository PAT
    # set per-repo on coily). This is the primary install path; the
    # per-repo bump-formula above stays one cycle as a fallback for the
    # old direct-repo tap.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - id: rev
        shell: bash
        run: |
          set -euo pipefail
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: coilysiren/agentic-os/actions/bump-formula@main
        with:
          repo: coilyco-bridge/homebrew-tap
          formula_path: Formula/coily.rb
          tag: ${{ needs.release.outputs.tag }}
          revision: ${{ steps.rev.outputs.revision }}
          url_template: "https://forgejo.coilysiren.me/coilyco-bridge/coily.git"
          message: "chore(formula): bump coily to {TAG} [skip ci]"
          forgejo_token: ${{ secrets.CI_RELEASE_TOKEN }}

  windows-assets:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - id: build
        shell: bash
        env:
          TAG: ${{ needs.release.outputs.tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          out="coily-windows-${ARCH}.exe"
          GOOS=windows GOARCH="$ARCH" \
            go build -tags prod \
            -ldflags "-s -w -X main.Version=${TAG}" \
            -o "$out" ./cmd/coily
          sha256sum "$out" | awk '{print $1}' > "$out.sha256"
          echo "exe=$out" >> "$GITHUB_OUTPUT"
          echo "sha=$out.sha256" >> "$GITHUB_OUTPUT"

      - uses: coilysiren/agentic-os/actions/upload-release-asset@main
        with:
          release_id: ${{ needs.release.outputs.release_id }}
          file: ${{ steps.build.outputs.exe }}

      - uses: coilysiren/agentic-os/actions/upload-release-asset@main
        with:
          release_id: ${{ needs.release.outputs.release_id }}
          file: ${{ steps.build.outputs.sha }}

  # Fan the canonical .claude lockdown files out to every catalog repo.
  # Keeps the committed (fail-closed) boundary in sync with this coily
  # version. Idempotent, so it no-ops when the render is unchanged.
  sync-lockdown:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: docker
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check out catalog source
        uses: actions/checkout@v6
        with:
          repository: coilysiren/agentic-os-kai
          ref: main
          path: .catalog
          token: ${{ secrets.CI_RELEASE_TOKEN }}

      - name: Render canonical lockdown files
        shell: bash
        run: |
          set -euo pipefail
          go build -tags prod -o /tmp/coily ./cmd/coily
          mkdir -p /tmp/canon && git -C /tmp/canon init -q
          /tmp/coily lockdown --apply --replace --path /tmp/canon

      - name: Fan out to catalog repos
        shell: bash
        env:
          FORGEJO_TOKEN: ${{ secrets.CI_RELEASE_TOKEN }}
        run: bash scripts/sync-lockdown.sh /tmp/canon "${{ needs.release.outputs.tag }}" .catalog/data/catalog-graph.yaml
