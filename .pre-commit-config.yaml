# Fixtures under cmd/subcli-scope/testdata/fixtures/ are verbatim captures of
# live CLI help output. They must stay byte-identical to what the upstream
# tool emits, so whitespace-normalizing hooks skip that path.
exclude: ^cmd/subcli-scope/testdata/fixtures/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        files: '(go\.mod|go\.sum)$'
        pass_filenames: false

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false

      - id: trufflehog
        name: trufflehog (secret scan, offline)
        description: Detect secrets in staged changes via local trufflehog binary (no API verification).
        entry: trufflehog git file://. --since-commit HEAD --no-verification --no-update --fail
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: verify-tools-manifest
        name: verify pkg/shell/tools.json (schema + upstream cross-check)
        description: Reject placeholder SHAs and cross-check kubectl entries against upstream .sha256.
        entry: python3 scripts/verify-tools-manifest.py
        language: system
        files: ^pkg/shell/tools\.json$
        pass_filenames: false
