      summary: Pass-through to yarn with argv validation + audit log.
    - path:
        - coily
        - setup
      summary: 'Run the post-upgrade rituals: completion, skill symlink, and lockdown re-baseline.'
      flags:
        - --skip-completion
        - --skip-lockdown
        - --skip-skill
        - --workspace
    - path:
        - coily
        - ssh
        - cat
      summary: Run cat <path>.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - copy
      summary: Upload a local file to the remote via sftp.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - deploy
        - eco-mod
      summary: Fetch the latest release zip(s) of <name> and unzip into the EcoServer tree.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - deploy
        - eco-mod-source
      summary: Rsync the source-tree Eco mod <name> from eco-mods / eco-mods-public into the EcoServer tree.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - deploy
        - repo-recall
      summary: Fast-forward /home/kai/projects/coilysiren/repo-recall and run /home/kai/projects/coilysiren/infrastructure/scripts/install-repo-recall.sh as root.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - file
      summary: Run file <path>.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - git
        - branch
      summary: Run git branch --show-current in <repo-path>.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - git
        - diff
      summary: Run git diff in <repo-path> (read-only, unstaged changes).
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - git
        - fetch
      summary: Run git fetch --all --prune in <repo-path>.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - git
        - log
      summary: Run git log --oneline -n 20 in <repo-path>.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - git
        - pull
      summary: Run git pull --ff-only in <repo-path>.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - git
        - rev-parse
      summary: Run git rev-parse HEAD in <repo-path>.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - git
        - status
      summary: Run git status --short --branch in <repo-path>.
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
        - git
        - update-index
      summary: Run git update-index --really-refresh in <repo-path> (re-hashes file contents to clear stat-stale phantom-dirty entries; mutates only the index's cached-stat column).
      flags:
        - --host
        - --user
    - path:
        - coily
        - ssh
