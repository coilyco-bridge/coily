      summary: Run wc <path>.
      flags:
        - --host
        - --user
    - path:
        - coily
        - tailscale
      summary: Pass-through to tailscale with argv validation + audit log.
    - path:
        - coily
        - trello
        - create
      summary: Create a new Trello card.
      flags:
        - --desc
        - --dir
        - --label
        - --list
        - --name
    - path:
        - coily
        - trello
        - sort
      summary: Sort each list so cards with the given label rise to the top.
      flags:
        - --dir
        - --dry
        - --label
    - path:
        - coily
        - trello
        - status
      summary: List Trello cards with their list, labels, and last activity.
      flags:
        - --dir
    - path:
        - coily
        - trello
        - update
      summary: Mutate one Trello card (move list, toggle labels, append a comment, rename, close/reopen).
      flags:
        - --close
        - --comment
        - --desc
        - --dir
        - --label-off
        - --label-on
        - --list
        - --name
        - --reopen
    - path:
        - coily
        - version
      summary: Print the build version and exit.
    - path:
        - coily
        - whoami
      summary: Print the authenticated identity coily sees across aws, kubectl, and gh.
