commands:
    - path:
        - coily
        - audit
        - path
      summary: Print the resolved audit log path and exit.
    - path:
        - coily
        - audit
        - tail
      summary: Stream audit records as JSONL.
      flags:
        - --follow
        - --since
    - path:
        - coily
        - aws
      summary: Pass-through to aws with argv validation + audit log.
    - path:
        - coily
        - core-keeper
        - restart
      summary: Restart the core-keeper-server unit.
    - path:
        - coily
        - core-keeper
        - start
      summary: Start the core-keeper-server unit.
    - path:
        - coily
        - core-keeper
        - status
      summary: Print systemctl status core-keeper-server.
    - path:
        - coily
        - core-keeper
        - stop
      summary: Stop the core-keeper-server unit.
    - path:
        - coily
        - core-keeper
        - tail
      summary: Tail core-keeper-server journal logs (journalctl -u core-keeper-server -f).
      flags:
        - --follow
        - --lines
    - path:
        - coily
        - docker
      summary: Pass-through to docker with argv validation + audit log.
    - path:
        - coily
        - eco
        - mod
        - push
      summary: scp a .zip to <server_dir> on kai-server and unzip -o it.
      flags:
        - --keep-remote
        - --server-dir
        - --src
    - path:
        - coily
        - eco
        - restart
      summary: Restart the eco-server systemd unit.
    - path:
        - coily
        - eco
        - start
      summary: Start the eco-server systemd unit.
    - path:
        - coily
        - eco
        - status
      summary: Print systemctl status eco-server.
    - path:
        - coily
        - eco
        - stop
      summary: Stop the eco-server systemd unit.
    - path:
        - coily
        - eco
        - tail
      summary: Tail eco-server journal logs (journalctl -u eco-server -f).
      flags:
        - --follow
        - --lines
    - path:
        - coily
        - eco
        - world
        - get-seed
      summary: Print the current Seed from Configs/WorldGenerator.eco.
      flags:
        - --configs-dir
    - path:
        - coily
        - eco
        - world
        - randomize
      summary: Generate a random seed and write it to Configs/WorldGenerator.eco.
      flags:
        - --configs-dir
    - path:
        - coily
        - eco
        - world
        - set-seed
      summary: Write a specific Seed into Configs/WorldGenerator.eco.
      flags:
        - --configs-dir
        - --seed
    - path:
        - coily
        - eco
        - world
        - snapshot
      summary: Copy Configs/WorldGenerator.eco to --target.
      flags:
        - --configs-dir
        - --target
    - path:
        - coily
        - gh
      summary: Pass-through to gh with argv validation + audit log.
    - path:
        - coily
        - git
        - audit-show
      summary: Resolve an Audit-log trailer back to its full audit record.
      flags:
        - --scope
        - --since
    - path:
        - coily
        - git
        - trailer
      summary: 'Emit Audit-log: trailers for the current repo.'
      flags:
        - --max
        - --scope
        - --since
    - path:
        - coily
        - git
        - trailer-hook
      summary: 'prepare-commit-msg hook: append Audit-log: trailers in place.'
    - path:
        - coily
        - icarus
        - restart
      summary: Restart the icarus-server unit.
    - path:
        - coily
        - icarus
        - start
      summary: Start the icarus-server unit.
    - path:
        - coily
        - icarus
        - status
      summary: Print systemctl status icarus-server.
    - path:
        - coily
        - icarus
        - stop
      summary: Stop the icarus-server unit.
    - path:
        - coily
        - icarus
        - tail
      summary: Tail icarus-server journal logs (journalctl -u icarus-server -f).
      flags:
        - --follow
        - --lines
    - path:
        - coily
        - install-completion
      summary: Install shell tab-completion for coily.
      flags:
        - --dry-run
        - --shell
    - path:
        - coily
        - kubectl
      summary: Pass-through to kubectl with argv validation + audit log.
    - path:
        - coily
        - lockdown
        - skill
      summary: Regenerate the coily-passthroughs skill from the in-process command tree.
      flags:
        - --format
        - --out
    - path:
        - coily
        - modio
        - mods
