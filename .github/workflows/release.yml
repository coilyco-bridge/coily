name: release

# Fully automatic release on every push to main:
#
# 1. Every commit triggers at least a patch bump. Conventional-commit
#    subjects bump higher:
#      <plain>    -> patch       fix: ...     -> patch
#      feat: ...  -> minor       feat!: ...   -> major  (also `BREAKING CHANGE:`)
# 2. A tag is created and pushed.
# 3. A GitHub Release is created with the auto-generated changelog.
# 4. The new tarball sha256 is computed, then a repository_dispatch is
#    fired to coilysiren/homebrew-tap whose own bump-coily workflow
#    rewrites Formula/coily.rb via the Contents API. The receiver lives
#    in homebrew-tap so the commit is signed by GitHub's web-flow key
#    (only installation-token API commits are auto-signed) and clears
#    the signed-commits ruleset.
#
# Unlike repo-recall, there is no source-tree version bump: coily's
# `main.Version` is set at build time via ldflags by the Formula, so
# the git tag is the only version artifact.
#
# All `${{ }}` interpolations below are repo-controlled (action outputs,
# job needs) - no github.event.* untrusted input flows into run blocks.
#
# Manual setup (one-time, requires Kai):
#   gh secret set HOMEBREW_TAP_TOKEN --repo coilysiren/coily
#     value: a fine-grained PAT scoped to coilysiren/homebrew-tap with
#            `Repository permissions -> Contents: Read and write`

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Tag next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Release on every commit. Plain commits get a patch bump;
          # `feat:` bumps minor; `feat!:` / `BREAKING CHANGE:` bumps major.
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  windows-build:
    # Cross-compile Windows binaries and attach to the release so the
    # coilysiren/scoop-bucket manifest has a stable asset URL to point at.
    # Mirrors the brew-tap path: brew builds from source via Formula, scoop
    # downloads the prebuilt .exe + .sha256 pair.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile coily-windows-${{ matrix.arch }}.exe
        env:
          GOOS: windows
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p bin
          out="bin/coily-windows-${GOARCH}.exe"
          go build -tags prod \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "$out" ./cmd/coily
          ( cd bin && sha256sum "$(basename "$out")" > "$(basename "$out").sha256" )

      - name: Attach binary + checksum to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            bin/coily-windows-${{ matrix.arch }}.exe
            bin/coily-windows-${{ matrix.arch }}.exe.sha256

  bump-tap:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve commit SHA at the release tag
        id: rev
        run: |
          set -euo pipefail
          revision=$(git rev-parse HEAD)
          url="ssh://git@github.com/coilysiren/coily.git"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Dispatch bump to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          NEW_URL: ${{ steps.rev.outputs.url }}
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        # The homebrew-tap ruleset requires signed commits. A PAT-driven
        # `git push` or Contents-API call from this runner produces an
        # unsigned commit and is rejected. Instead we trigger the
        # bump-coily workflow in homebrew-tap, where the built-in
        # GITHUB_TOKEN (an installation token) drives the Contents API
        # and the resulting commit is web-flow-signed by GitHub.
        #
        # Payload carries the .git remote URL plus the commit revision at
        # the tag - the tap rewrites Formula/coily.rb to brew's git URL
        # strategy (url+tag+revision), avoiding GitHub's anonymous-archive
        # rate-limit bucket. See homebrew-tap#26.
        run: |
          set -euo pipefail
          gh api -X POST repos/coilysiren/homebrew-tap/dispatches \
            -f event_type=bump-coily \
            -f "client_payload[tag]=${TAG}" \
            -f "client_payload[url]=${NEW_URL}" \
            -f "client_payload[revision]=${NEW_REVISION}"
