name: release

# Tag-only release on every push to main. Conventional commits drive the
# semver bump. Tag is created at the pushed commit, GH Release is cut
# with the auto-generated changelog, then bump-formula rewrites the
# Formula's url+tag+revision line via the Contents API (web-flow signed,
# satisfies the signed-commits ruleset).
#
# Brew install path is direct-repo (no aggregator tap):
#   brew tap coilysiren/coily https://forgejo.coilysiren.me/coilysiren/coily
#   brew install coilysiren/coily/coily
#
# `main.Version` is set at build time via ldflags by the Formula, so the
# git tag is the only version artifact.
#
# All `${{ }}` interpolations are repo-controlled - no github.event.*
# untrusted input flows into a run block.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Tag next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Release on every commit. Plain commits get a patch bump;
          # `feat:` bumps minor; `feat!:` / `BREAKING CHANGE:` bumps major.
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  windows-build:
    # Cross-compile Windows binaries and attach to the release so the
    # coilysiren/scoop-bucket manifest has a stable asset URL to point at.
    # Mirrors the brew-tap path: brew builds from source via Formula, scoop
    # downloads the prebuilt .exe + .sha256 pair.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile coily-windows-${{ matrix.arch }}.exe
        env:
          GOOS: windows
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p bin
          out="bin/coily-windows-${GOARCH}.exe"
          go build -tags prod \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "$out" ./cmd/coily
          ( cd bin && sha256sum "$(basename "$out")" > "$(basename "$out").sha256" )

      - name: Attach binary + checksum to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            bin/coily-windows-${{ matrix.arch }}.exe
            bin/coily-windows-${{ matrix.arch }}.exe.sha256

  bump-formula:
    # Rewrite Formula/coily.rb's url line to point at the just-cut tag +
    # revision. Brew reads the formula from the tap clone (latest main),
    # so the rewrite has to land back here. Commit message carries the
    # skip-CI marker so this push doesn't re-trigger the release workflow.
    # The GITHUB_TOKEN Contents API commit is web-flow signed and clears
    # the signed-commits ruleset.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release.outputs.tag }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve commit SHA at the release tag
        id: rev
        run: |
          set -euo pipefail
          revision=$(git rev-parse HEAD)
          echo "revision=$revision" >> "$GITHUB_OUTPUT"

      - name: Rewrite Formula url via Contents API
        env:
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        run: |
          set -euo pipefail
          path=Formula/coily.rb
          tmp=$(mktemp -d)
          curl -fsSL \
            "https://raw.githubusercontent.com/${REPO}/main/${path}" \
            > "$tmp/coily.rb"
          new_line="  url \"https://forgejo.coilysiren.me/${REPO}.git\", tag: \"${TAG}\", revision: \"${NEW_REVISION}\""
          sed -i "s|^  url \".*|${new_line}|" "$tmp/coily.rb"
          cur_sha=$(gh api "repos/${REPO}/contents/${path}?ref=main" --jq .sha)
          new_b64=$(base64 -w0 < "$tmp/coily.rb")
          gh api -X PUT "repos/${REPO}/contents/${path}" \
            -f message="chore(formula): bump to ${TAG} [skip ci]" \
            -f content="$new_b64" \
            -f sha="$cur_sha" \
            -f branch=main

  bump-scoop:
    # Rewrite coilysiren/scoop-bucket's bucket/coily.json to point at the
    # just-cut tag + freshly-uploaded Windows asset hashes. Mirrors
    # bump-formula but writes cross-repo, so it uses SCOOP_BUCKET_TOKEN
    # (a fine-grained PAT scoped to coilysiren/scoop-bucket Contents:
    # write) instead of GITHUB_TOKEN, which cannot reach across repos.
    # The Contents API commit is web-flow signed and clears the
    # signed-commits ruleset on the bucket repo. Commit message carries
    # [skip ci] for parity with bump-formula. Soft-skips if the secret is
    # not set, so the workflow doesn't fail before the PAT is wired up.
    needs: [release, windows-build]
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
      VERSION: ${{ needs.release.outputs.version }}
      BUCKET_REPO: coilysiren/scoop-bucket
      SCOOP_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
      SOURCE_REPO: ${{ github.repository }}
      DEFAULT_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Skip if SCOOP_BUCKET_TOKEN not configured
        id: gate
        run: |
          set -euo pipefail
          if [ -z "${SCOOP_TOKEN:-}" ]; then
            echo "::warning::SCOOP_BUCKET_TOKEN secret is not set; skipping scoop manifest bump. See coilysiren/coily#258."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch sha256 sidecars from release
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ env.DEFAULT_GH_TOKEN }}
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          echo "TMP=$tmp" >> "$GITHUB_ENV"
          for arch in amd64 arm64; do
            asset="coily-windows-${arch}.exe.sha256"
            gh release download "${TAG}" \
              --repo "${SOURCE_REPO}" \
              --pattern "$asset" \
              --dir "$tmp"
            hash=$(awk '{print $1}' "$tmp/$asset")
            echo "HASH_${arch}=${hash}" >> "$GITHUB_ENV"
          done

      - name: Rewrite scoop manifest via Contents API
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ env.SCOOP_TOKEN }}
        run: |
          set -euo pipefail
          path=bucket/coily.json
          ver="${VERSION#v}"
          ver="${ver:-${TAG#v}}"
          tmp_file="${TMP}/coily.json"
          curl -fsSL \
            "https://raw.githubusercontent.com/${BUCKET_REPO}/main/${path}" \
            > "$tmp_file"
          python3 - "$tmp_file" "$ver" "$HASH_amd64" "$HASH_arm64" <<'PY'
          import json, sys
          path, ver, h64, harm = sys.argv[1:5]
          with open(path) as f:
              m = json.load(f)
          m["version"] = ver
          arch = m["architecture"]
          arch["64bit"]["url"] = f"https://github.com/coilysiren/coily/releases/download/v{ver}/coily-windows-amd64.exe#/coily.exe"
          arch["64bit"]["hash"] = h64
          arch["arm64"]["url"] = f"https://github.com/coilysiren/coily/releases/download/v{ver}/coily-windows-arm64.exe#/coily.exe"
          arch["arm64"]["hash"] = harm
          with open(path, "w") as f:
              json.dump(m, f, indent=4)
              f.write("\n")
          PY
          cur_sha=$(gh api "repos/${BUCKET_REPO}/contents/${path}?ref=main" --jq .sha)
          new_b64=$(base64 -w0 < "$tmp_file")
          gh api -X PUT "repos/${BUCKET_REPO}/contents/${path}" \
            -f message="chore(coily): bump to ${TAG} [skip ci]" \
            -f content="$new_b64" \
            -f sha="$cur_sha" \
            -f branch=main
