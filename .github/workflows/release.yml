name: release

# Tag-only release on every push to main. Conventional commits drive the
# semver bump. Tag is created at the pushed commit, GH Release is cut
# with the auto-generated changelog, then bump-formula rewrites the
# Formula's url+tag+revision line via the Contents API (web-flow signed,
# satisfies the signed-commits ruleset).
#
# Brew install path is direct-repo (no aggregator tap):
#   brew tap coilysiren/coily https://github.com/coilysiren/coily
#   brew install coilysiren/coily/coily
#
# `main.Version` is set at build time via ldflags by the Formula, so the
# git tag is the only version artifact.
#
# All `${{ }}` interpolations are repo-controlled - no github.event.*
# untrusted input flows into a run block.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Tag next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Release on every commit. Plain commits get a patch bump;
          # `feat:` bumps minor; `feat!:` / `BREAKING CHANGE:` bumps major.
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  windows-build:
    # Cross-compile Windows binaries and attach to the release so the
    # coilysiren/scoop-bucket manifest has a stable asset URL to point at.
    # Mirrors the brew-tap path: brew builds from source via Formula, scoop
    # downloads the prebuilt .exe + .sha256 pair.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile coily-windows-${{ matrix.arch }}.exe
        env:
          GOOS: windows
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p bin
          out="bin/coily-windows-${GOARCH}.exe"
          go build -tags prod \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "$out" ./cmd/coily
          ( cd bin && sha256sum "$(basename "$out")" > "$(basename "$out").sha256" )

      - name: Attach binary + checksum to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            bin/coily-windows-${{ matrix.arch }}.exe
            bin/coily-windows-${{ matrix.arch }}.exe.sha256

  bump-formula:
    # Rewrite Formula/coily.rb's url line to point at the just-cut tag +
    # revision. Brew reads the formula from the tap clone (latest main),
    # so the rewrite has to land back here. Commit message carries the
    # skip-CI marker so this push doesn't re-trigger the release workflow.
    # The GITHUB_TOKEN Contents API commit is web-flow signed and clears
    # the signed-commits ruleset.
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release.outputs.tag }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve commit SHA at the release tag
        id: rev
        run: |
          set -euo pipefail
          revision=$(git rev-parse HEAD)
          echo "revision=$revision" >> "$GITHUB_OUTPUT"

      - name: Rewrite Formula url via Contents API
        env:
          NEW_REVISION: ${{ steps.rev.outputs.revision }}
        run: |
          set -euo pipefail
          path=Formula/coily.rb
          tmp=$(mktemp -d)
          curl -fsSL \
            "https://raw.githubusercontent.com/${REPO}/main/${path}" \
            > "$tmp/coily.rb"
          new_line="  url \"ssh://git@github.com/${REPO}.git\", tag: \"${TAG}\", revision: \"${NEW_REVISION}\""
          sed -i "s|^  url \".*|${new_line}|" "$tmp/coily.rb"
          cur_sha=$(gh api "repos/${REPO}/contents/${path}?ref=main" --jq .sha)
          new_b64=$(base64 -w0 < "$tmp/coily.rb")
          gh api -X PUT "repos/${REPO}/contents/${path}" \
            -f message="chore(formula): bump to ${TAG} [skip ci]" \
            -f content="$new_b64" \
            -f sha="$cur_sha" \
            -f branch=main
