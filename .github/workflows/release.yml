name: release

# Fully automatic release on every push to main:
#
# 1. Every commit triggers at least a patch bump. Conventional-commit
#    subjects bump higher:
#      <plain>    -> patch       fix: ...     -> patch
#      feat: ...  -> minor       feat!: ...   -> major  (also `BREAKING CHANGE:`)
# 2. A tag is created and pushed.
# 3. A GitHub Release is created with the auto-generated changelog.
# 4. The new tarball sha256 is computed and pushed *directly* to
#    coilysiren/homebrew-tap - no PR step. brew upgrade picks it up.
#
# Unlike repo-recall, there is no source-tree version bump: coily's
# `main.Version` is set at build time via ldflags by the Formula, so
# the git tag is the only version artifact.
#
# All `${{ }}` interpolations below are repo-controlled (action outputs,
# job needs) - no github.event.* untrusted input flows into run blocks.
#
# Manual setup (one-time, requires Kai):
#   gh secret set HOMEBREW_TAP_TOKEN --repo coilysiren/coily
#     value: a fine-grained PAT scoped to coilysiren/homebrew-tap with
#            `Repository permissions -> Contents: Read and write`

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
      version: ${{ steps.tag.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Release on every commit. Plain commits get a patch bump;
          # `feat:` bumps minor; `feat!:` / `BREAKING CHANGE:` bumps major.
          default_bump: patch
          release_branches: main

      - name: Create GitHub Release
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  bump-tap:
    needs: release
    if: ${{ needs.release.outputs.tag != '' }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - name: Compute tarball sha256
        id: sha
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          url="https://github.com/coilysiren/coily/archive/refs/tags/${TAG}.tar.gz"
          # Tags can take a few seconds to propagate to the archive endpoint
          # after the release job pushes them. Retry briefly to absorb that.
          for i in 1 2 3 4 5; do
            if sha=$(curl -fsSL "$url" | shasum -a 256 | cut -d' ' -f1); then
              break
            fi
            sleep 5
          done
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Bump Formula via GitHub Contents API
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          NEW_URL: ${{ steps.sha.outputs.url }}
          NEW_SHA: ${{ steps.sha.outputs.sha }}
        # The Contents API produces commits signed by GitHub (web-flow),
        # which satisfies the homebrew-tap ruleset's signed-commits
        # requirement. A direct `git push` from the runner cannot.
        run: |
          set -euo pipefail
          path=Formula/coily.rb
          repo=coilysiren/homebrew-tap
          tmp=$(mktemp -d)
          gh api "repos/${repo}/contents/${path}" --jq .sha > "$tmp/sha"
          gh api "repos/${repo}/contents/${path}" --jq .content \
            | base64 -d > "$tmp/coily.rb"
          sed -i "s|^  url \".*\"|  url \"${NEW_URL}\"|"       "$tmp/coily.rb"
          sed -i "s|^  sha256 \".*\"|  sha256 \"${NEW_SHA}\"|" "$tmp/coily.rb"
          new_b64=$(base64 -w0 < "$tmp/coily.rb")
          gh api -X PUT "repos/${repo}/contents/${path}" \
            -f message="coily: bump to ${TAG}" \
            -f content="$new_b64" \
            -f sha="$(cat "$tmp/sha")" \
            -f branch=main
