# Auto-close external pull requests.
#
# coily is a CLI security boundary. An external PR is an attack surface, not
# a contribution - see CONTRIBUTING.md. This workflow closes PRs opened by
# anyone without write access, with a comment routing them to
# coilysiren/agent-guard, the contribution-friendly version of the same idea.
#
# pull_request_target runs with base-repo permissions and does NOT check out
# PR code, so a hostile PR branch cannot influence this job. No untrusted
# github.event.* value is interpolated into a run or script block; the
# script body is static and uses only the context object.
name: close-external-prs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    # Skip PRs from the owner or a write-access collaborator/member.
    if: >-
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'COLLABORATOR' &&
      github.event.pull_request.author_association != 'MEMBER'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Thanks for the interest. coily does not accept external pull requests.",
              "",
              "coily is a CLI security boundary. An external change to it is an attack surface on the thing whose whole job is to *be* a trustworthy boundary, so the contribution model here is deliberately closed. See [CONTRIBUTING.md](https://github.com/coilysiren/coily/blob/main/CONTRIBUTING.md).",
              "",
              "If you want to contribute to this kind of tooling, [coilysiren/agent-guard](https://github.com/coilysiren/agent-guard) is the generalizable, contribution-friendly version of the same idea - coily delegates its PreToolUse hook to it. Pull requests are welcome there.",
              "",
              "Bug reports and ideas are very welcome as issues on this repo.",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed",
            });
