# Release the pinned aws / kubectl / gh binaries to the `tools-latest`
# GitHub Release. coily fetches them at runtime, verifies the sha256 from
# the in-tree pkg/shell/tools.yaml manifest, and caches under
# ~/.cache/coily/bin. PATH is never trusted.
#
# This workflow:
#   1. Downloads each (tool, goos, goarch) from upstream.
#   2. Computes sha256 over the bytes.
#   3. Updates pkg/shell/tools.yaml with real SHAs (commits back to main).
#   4. Force-overwrites the `tools-latest` release with the binaries attached.
#
# Run manually via workflow_dispatch when bumping pinned versions, or on
# the weekly schedule to refresh against upstream patch releases.

name: release-tools

on:
  workflow_dispatch:
    inputs:
      aws_version:
        description: "aws-cli v2 version (e.g. 2.17.0). Leave blank to auto-resolve latest."
        required: false
        default: ""
      kubectl_version:
        description: "kubectl version (e.g. 1.31.0). Leave blank to auto-resolve latest."
        required: false
        default: ""
      gh_version:
        description: "gh version (e.g. 2.55.0). Leave blank to auto-resolve latest."
        required: false
        default: ""
  schedule:
    # Sunday 06:00 UTC. Refreshes against patch releases.
    - cron: "0 6 * * 0"
  push:
    branches: [main]
    # Skip the self-triggering loop from this workflow's own commit back to main.
    paths-ignore:
      - "pkg/shell/tools.yaml"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      # Pull workflow_dispatch inputs into env so downstream `run:` blocks
      # never interpolate untrusted-looking ${{ }} into shell strings.
      # Empty on schedule/push events, or when the user left inputs blank.
      # The "Resolve versions" step below fills in anything empty by
      # querying upstream for latest.
      AWS_VERSION_INPUT: ${{ github.event.inputs.aws_version }}
      KUBECTL_VERSION_INPUT: ${{ github.event.inputs.kubectl_version }}
      GH_VERSION_INPUT: ${{ github.event.inputs.gh_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve versions (auto-latest for anything blank)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # kubectl: official "stable" pointer, strip leading v.
          if [ -z "$KUBECTL_VERSION_INPUT" ]; then
            KUBECTL_VERSION="$(curl -fsSL https://dl.k8s.io/release/stable.txt | sed 's/^v//')"
          else
            KUBECTL_VERSION="$KUBECTL_VERSION_INPUT"
          fi
          # gh: GitHub's own CLI, latest release tag like "v2.55.0".
          if [ -z "$GH_VERSION_INPUT" ]; then
            GH_VERSION="$(gh release view --repo cli/cli --json tagName -q '.tagName' | sed 's/^v//')"
          else
            GH_VERSION="$GH_VERSION_INPUT"
          fi
          # aws-cli v2: no GitHub "latest release" (only prereleases exist),
          # so resolve via the tags API. Tags on aws/aws-cli are bare "2.17.0"
          # strings; filter to v2.x and take the newest.
          if [ -z "$AWS_VERSION_INPUT" ]; then
            AWS_VERSION="$(gh api /repos/aws/aws-cli/tags --jq '[.[] | select(.name | test("^2\\."))][0].name')"
          else
            AWS_VERSION="$AWS_VERSION_INPUT"
          fi
          echo "Resolved: aws=$AWS_VERSION kubectl=$KUBECTL_VERSION gh=$GH_VERSION"
          echo "AWS_VERSION=$AWS_VERSION"         >> "$GITHUB_ENV"
          echo "KUBECTL_VERSION=$KUBECTL_VERSION" >> "$GITHUB_ENV"
          echo "GH_VERSION=$GH_VERSION"           >> "$GITHUB_ENV"

      - name: Prepare staging dir
        run: mkdir -p staging

      # Each tool below: fetch from upstream, extract the binary if
      # archived, name it <tool>-<goos>-<goarch>, drop in staging/.
      - name: Fetch kubectl (all platforms)
        run: |
          set -euo pipefail
          # Windows upstream URL ends in .exe; the other platforms are
          # extensionless. We strip the suffix on disk so every staged
          # asset is named `kubectl-<goos>-<goarch>` flat, matching the
          # verify-tools-manifest.py basename rule. coily appends `.exe`
          # at cache-write time on Windows (see pkg/shell/tools.go).
          for plat in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            os="${plat%/*}"; arch="${plat#*/}"
            upstream="kubectl"
            [ "$os" = "windows" ] && upstream="kubectl.exe"
            url="https://dl.k8s.io/release/v${KUBECTL_VERSION}/bin/${os}/${arch}/${upstream}"
            curl -fsSL -o "staging/kubectl-${os}-${arch}" "$url"
            chmod +x "staging/kubectl-${os}-${arch}"
          done

      - name: Fetch gh (all platforms)
        run: |
          set -euo pipefail
          # Per-platform archive format. `bin` is the filename inside the
          # archive; the staged asset drops the .exe so the flat
          # `<tool>-<goos>-<goarch>` name satisfies
          # verify-tools-manifest.py. coily appends .exe at cache-write
          # time on Windows.
          #
          # Archive internal layout varies: darwin/linux wrap everything
          # under gh_<ver>_<os>_<arch>/, while windows puts bin/gh.exe at
          # the top level. Use `find` to locate the binary rather than
          # hard-coding a path that breaks when upstream reshuffles.
          for plat in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            os="${plat%/*}"; arch="${plat#*/}"
            case "$os" in
              darwin)  ext="zip";    osname="macOS";   bin="gh";;
              linux)   ext="tar.gz"; osname="linux";   bin="gh";;
              windows) ext="zip";    osname="windows"; bin="gh.exe";;
            esac
            url="https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_${osname}_${arch}.${ext}"
            tmp="$(mktemp -d)"
            curl -fsSL -o "$tmp/pkg.${ext}" "$url"
            if [ "$ext" = "zip" ]; then
              unzip -q "$tmp/pkg.${ext}" -d "$tmp"
            else
              tar -xzf "$tmp/pkg.${ext}" -C "$tmp"
            fi
            src="$(find "$tmp" -type f -name "$bin" | head -1)"
            if [ -z "$src" ]; then
              echo "gh archive for $plat: did not find $bin under $tmp" >&2
              find "$tmp" -maxdepth 3 -type f >&2
              exit 1
            fi
            cp "$src" "staging/gh-${os}-${arch}"
            chmod +x "staging/gh-${os}-${arch}"
          done

      - name: Install msitools for Windows aws-cli extraction
        run: |
          set -euo pipefail
          # aws-cli v2 on Windows ships exclusively as an MSI installer.
          # msiextract (from the msitools package) cracks the MSI open on
          # Linux so we can pull out the PyInstaller onedir without
          # running the installer. Not in the default ubuntu-latest image.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends msitools

      - name: Fetch aws CLI (all platforms)
        run: |
          set -euo pipefail
          # AWS CLI v2 ships as a PyInstaller onedir bundle inside
          # platform installers (.pkg for macOS, .zip for Linux, .msi
          # for Windows). The launcher alone cannot boot: it dlopens
          # `Python` (bundled shared lib) from its own directory and
          # resolves site-packages there too. So we tar up the whole
          # `dist/` tree per platform. coily's FetchingResolver handles
          # archive entries by extracting into
          # ~/.cache/coily/bin/<sha>/ and running dist/aws (or aws.exe
          # on Windows).
          #
          # NOTE: Ubuntu dropped `xar` from apt and bsdtar's xar
          # support mangles output paths, so macOS .pkg cracking goes
          # through the pure-Python reader in scripts/extract-xar.py.
          for plat in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            os="${plat%/*}"; arch="${plat#*/}"
            tmp="$(mktemp -d)"
            case "$os" in
              darwin)
                url="https://awscli.amazonaws.com/AWSCLIV2-${AWS_VERSION}.pkg"
                curl -fsSL -o "$tmp/aws.pkg" "$url"
                python3 scripts/extract-xar.py "$tmp/aws.pkg" "$tmp"
                ( cd "$tmp" && cat aws-cli.pkg/Payload | gunzip -dc | cpio -id 2>/dev/null )
                # macOS .pkg drops the onedir bundle directly under
                # aws-cli/ (no dist/ subdir unlike Linux). Rename so the
                # tarball entry path matches across platforms.
                mv "$tmp/aws-cli" "$tmp/dist"
                tar -C "$tmp" -czf "staging/aws-${os}-${arch}.tar.gz" dist
                ;;
              linux)
                if [ "$arch" = "amd64" ]; then
                  url="https://awscli.amazonaws.com/awscli-exe-linux-x86_64-${AWS_VERSION}.zip"
                else
                  url="https://awscli.amazonaws.com/awscli-exe-linux-aarch64-${AWS_VERSION}.zip"
                fi
                curl -fsSL -o "$tmp/aws.zip" "$url"
                unzip -q "$tmp/aws.zip" -d "$tmp"
                # Layout: $tmp/aws/dist/{aws, Python, ...}
                tar -C "$tmp/aws" -czf "staging/aws-${os}-${arch}.tar.gz" dist
                ;;
              windows)
                # AWS only publishes one Windows MSI (x86_64). If arch
                # ever expands, re-evaluate.
                url="https://awscli.amazonaws.com/AWSCLIV2-${AWS_VERSION}.msi"
                curl -fsSL -o "$tmp/aws.msi" "$url"
                mkdir -p "$tmp/extracted"
                ( cd "$tmp/extracted" && msiextract "$tmp/aws.msi" )
                # msiextract reproduces the Program Files tree. The
                # onedir bundle lands at:
                #   <extracted>/PFiles/Amazon/AWSCLIV2/
                # Normalize to dist/ so the tarball shape matches
                # darwin/linux and the manifest's entry: dist/aws.exe
                # path stays uniform.
                bundle="$(find "$tmp/extracted" -type d -name AWSCLIV2 | head -1)"
                if [ -z "$bundle" ] || [ ! -f "$bundle/aws.exe" ]; then
                  echo "aws windows: did not find AWSCLIV2/aws.exe under $tmp/extracted" >&2
                  find "$tmp/extracted" -maxdepth 4 -type d >&2
                  exit 1
                fi
                mv "$bundle" "$tmp/dist"
                tar -C "$tmp" -czf "staging/aws-${os}-${arch}.tar.gz" dist
                ;;
            esac
          done

      - name: Compute sha256 for every staged binary
        run: |
          set -euo pipefail
          : > shas.txt
          for f in staging/*; do
            sum=$(sha256sum "$f" | awk '{print $1}')
            name=$(basename "$f")
            echo "${name} ${sum}" >> shas.txt
          done
          cat shas.txt

      - name: Update pkg/shell/tools.yaml with real SHAs
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os, pathlib
          import yaml
          shas = {}
          for line in pathlib.Path("shas.txt").read_text().splitlines():
              name, sum_ = line.split()
              shas[name] = sum_
          manifest = yaml.safe_load(pathlib.Path("pkg/shell/tools.yaml").read_text())
          versions = {
              "aws":     os.environ["AWS_VERSION"],
              "kubectl": os.environ["KUBECTL_VERSION"],
              "gh":      os.environ["GH_VERSION"],
          }
          # aws is a PyInstaller onedir bundle - ship the whole dist/
          # tree as a tarball and point `entry` at the launcher inside.
          # kubectl and gh stay single-file downloads.
          def asset_basename(tool: str, goos: str, goarch: str) -> str:
              base = f"{tool}-{goos}-{goarch}"
              if tool == "aws":
                  return f"{base}.tar.gz"
              return base
          def archive_fields(tool: str, goos: str):
              if tool == "aws":
                  entry = "dist/aws.exe" if goos == "windows" else "dist/aws"
                  return {"archive": "tar.gz", "entry": entry}
              return None
          def upstream_url(tool: str, goos: str, goarch: str, version: str) -> str:
              if tool == "kubectl":
                  leaf = "kubectl.exe" if goos == "windows" else "kubectl"
                  return f"https://dl.k8s.io/release/v{version}/bin/{goos}/{goarch}/{leaf}"
              if tool == "gh":
                  osname = {"darwin": "macOS", "linux": "linux", "windows": "windows"}[goos]
                  ext    = {"darwin": "zip", "linux": "tar.gz", "windows": "zip"}[goos]
                  return f"https://github.com/cli/cli/releases/download/v{version}/gh_{version}_{osname}_{goarch}.{ext}"
              if tool == "aws":
                  if goos == "darwin":
                      return "https://awscli.amazonaws.com/AWSCLIV2.pkg"
                  if goos == "windows":
                      return "https://awscli.amazonaws.com/AWSCLIV2.msi"
                  arch = "x86_64" if goarch == "amd64" else "aarch64"
                  return f"https://awscli.amazonaws.com/awscli-exe-linux-{arch}.zip"
              raise KeyError(tool)
          for tool, plats in manifest["tools"].items():
              for plat_key, entry in plats.items():
                  goos, goarch = plat_key.split("/")
                  asset = asset_basename(tool, goos, goarch)
                  if asset in shas:
                      version = versions.get(tool, entry.get("version", ""))
                      entry["sha256"]       = shas[asset]
                      entry["version"]      = version
                      entry["url"]          = f"{manifest['release_url_base']}/{asset}"
                      entry["upstream_url"] = upstream_url(tool, goos, goarch, version)
                      extras = archive_fields(tool, goos)
                      if extras is not None:
                          entry.update(extras)
                      else:
                          entry.pop("archive", None)
                          entry.pop("entry", None)
          pathlib.Path("pkg/shell/tools.yaml").write_text(
              yaml.safe_dump(manifest, sort_keys=False)
          )
          PY

      - name: Verify manifest (schema + upstream cross-check)
        run: python3 scripts/verify-tools-manifest.py

      - name: Commit updated manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Branch protection on main requires verified signatures. The
          # GITHUB_TOKEN identity (github-actions[bot]) cannot sign commits
          # made by the local git client, but commits created via the
          # Contents API are auto-signed by GitHub. Push through the API
          # rather than `git push` so the rule is satisfied.
          if git diff --quiet pkg/shell/tools.yaml; then
            echo "manifest unchanged"
            exit 0
          fi
          sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/pkg/shell/tools.yaml" --jq '.sha')"
          content_b64="$(base64 -w0 < pkg/shell/tools.yaml)"
          message="Refresh tools.yaml (aws=${AWS_VERSION}, kubectl=${KUBECTL_VERSION}, gh=${GH_VERSION})"
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/pkg/shell/tools.yaml" \
            -f message="$message" \
            -f content="$content_b64" \
            -f sha="$sha" \
            -f branch=main >/dev/null
          # Pull the new commit so subsequent steps in this job see a clean tree.
          git fetch origin main
          git reset --hard origin/main

      - name: Force-overwrite tools-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Delete and recreate so the tag points at the current commit
          # and the assets are fresh. `gh release delete --cleanup-tag`
          # also removes the underlying git tag.
          gh release delete tools-latest --yes --cleanup-tag || true
          gh release create tools-latest \
            --title "tools-latest" \
            --notes "Pinned aws=${AWS_VERSION}, kubectl=${KUBECTL_VERSION}, gh=${GH_VERSION}. Force-pushed on every prod build." \
            staging/*
