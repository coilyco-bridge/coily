        - name: --selector
          type: string
        - name: --show-managed-fields
          type: bool
        - name: --template
          type: string
    - path:
        - rollout
        - resume
      help: Resume a paused resource.
      flags:
        - name: --allow-missing-template-keys
          type: bool
        - name: --field-manager
          type: string
        - name: --filename
          type: stringSlice
        - name: --kustomize
          type: string
        - name: --output
          type: string
        - name: --recursive
          type: bool
        - name: --selector
          type: string
        - name: --show-managed-fields
          type: bool
        - name: --template
          type: string
