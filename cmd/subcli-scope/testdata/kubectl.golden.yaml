commands:
    - path:
        - rollout
      help: Manage the rollout of one or many resources.
      children:
        - history
        - pause
        - restart
        - resume
        - status
        - undo
    - path:
        - rollout
        - history
      help: View previous rollout revisions and configurations.
      flags:
        - name: --allow-missing-template-keys
          type: bool
        - name: --filename
          type: stringSlice
        - name: --kustomize
          type: string
        - name: --output
          type: string
        - name: --recursive
          type: bool
        - name: --revision
          type: int
        - name: --selector
          type: string
        - name: --show-managed-fields
          type: bool
        - name: --template
          type: string
    - path:
        - rollout
        - pause
      help: Mark the provided resource as paused.
      flags:
        - name: --allow-missing-template-keys
          type: bool
        - name: --field-manager
          type: string
        - name: --filename
          type: stringSlice
        - name: --kustomize
          type: string
        - name: --output
          type: string
        - name: --recursive
          type: bool
        - name: --selector
          type: string
        - name: --show-managed-fields
          type: bool
        - name: --template
          type: string
    - path:
