binary: tailscale
mode: allow
# Homelab-relevant verbs. tailscale ssh is the fallback path used by
# eco-spec-tracker / galaxy-gen when the k3s API isn't directly reachable
# (pipe manifest over ssh, apply from kai-server). netcheck/status/ping/ip
# are diagnostic staples. serve/funnel/cert/whois/switch/set round out the
# daily-ops surface. Exit-node, drive, appc-routes, lock, syspolicy, web,
# bugreport, licenses, nc, wait, completion, metrics, dns, configure, file
# stay out until a concrete use-case forces them in.
roots:
  - up
  - down
  - logout
  - login
  - set
  - status
  - ip
  - ping
  - ssh
  - serve
  - funnel
  - cert
  - netcheck
  - version
  - whois
  - switch
  - update
