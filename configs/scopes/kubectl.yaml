binary: kubectl
mode: deny
# Deny-listed verbs are either destructive in ways that need out-of-band
# confirmation (and will be re-added behind token-gated coily verbs), or
# escape hatches that collapse the trust boundary.
roots:
  - exec
  - attach
  - port-forward
  - proxy
  - run
  - cp
  - debug
  - edit
  - replace
  - kustomize
  - alpha
  - plugin
  - options
