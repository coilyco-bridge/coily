binary: docker
mode: allow
# CI deploy surface: build + tag + push cover the .publish recipe in
# backend / eco-mcp-app / eco-spec-tracker / galaxy-gen. Local dev surface:
# run, ps, logs, exec, stop, start, rm, rmi, inspect, images. login/logout
# for registry auth. compose for any compose-up flows. Swarm, scout, ai,
# buildx, desktop, dev, extension, feedback, init, sbom, trust, plugin,
# checkpoint, debug, context stay out until something actually needs them.
roots:
  - build
  - tag
  - push
  - pull
  - run
  - exec
  - ps
  - logs
  - stop
  - start
  - restart
  - rm
  - rmi
  - image
  - images
  - inspect
  - kill
  - cp
  - commit
  - version
  - info
  - login
  - logout
  - search
  - compose
  - container
  - network
  - volume
  - system
  - manifest
