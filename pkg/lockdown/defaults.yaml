  # gh read verbs. Write verbs go through coily ops gh. `gh api` is omitted
  # because --method silently turns a read into POST/PUT/DELETE; route
  # API calls through coily ops gh.
  - Bash(gh auth status:*)
  - Bash(gh status:*)
  - Bash(gh repo view:*)
  - Bash(gh repo list:*)
  - Bash(gh pr view:*)
  - Bash(gh pr list:*)
  - Bash(gh pr diff:*)
  - Bash(gh pr status:*)
  - Bash(gh pr checks:*)
  - Bash(gh issue view:*)
  - Bash(gh issue list:*)
  - Bash(gh issue status:*)
  - Bash(gh run view:*)
  - Bash(gh run list:*)
  - Bash(gh run watch:*)
  - Bash(gh release view:*)
  - Bash(gh release list:*)
  - Bash(gh workflow view:*)
  - Bash(gh workflow list:*)
  - Bash(gh search:*)
  - Bash(gh label list:*)
  - Bash(gh cache list:*)
  - Bash(gh secret list:*)
  - Bash(gh variable list:*)
  - Bash(gh ruleset list:*)
  - Bash(gh ruleset view:*)

deny:
  # Scripting interpreters. Each of these can spawn a subprocess that runs
  # anything, which defeats prefix-based allowlisting.
  - Bash(python:*)
  - Bash(python3:*)
  - Bash(ruby:*)
  - Bash(perl:*)
  - Bash(node:*)
  - Bash(deno:*)
  - Bash(bun:*)
  - Bash(osascript:*)
  - Bash(go run:*)

  # Shells. Same problem. Disallow invoking them directly.
  - Bash(sh:*)
  - Bash(bash:*)
  - Bash(zsh:*)
  - Bash(fish:*)
  - Bash(dash:*)
  - Bash(ksh:*)
  - Bash(env:*)
  - Bash(exec:*)
  - Bash(xargs:*)

  # Windows shells. Same problem. Kai's primary host is Windows and Git Bash
  # can shell out to cmd/PowerShell, which gives arbitrary execution.
  - Bash(cmd:*)
  - Bash(cmd.exe:*)
  - Bash(powershell:*)
  - Bash(powershell.exe:*)
  - Bash(pwsh:*)
  - Bash(pwsh.exe:*)

  # Windows scripting hosts and LOLBAS execution vectors. Each can run
  # arbitrary scripts or load arbitrary DLLs, defeating prefix allowlisting.
  - Bash(wscript:*)
  - Bash(wscript.exe:*)
  - Bash(cscript:*)
  - Bash(cscript.exe:*)
  - Bash(mshta:*)
  - Bash(mshta.exe:*)
  - Bash(rundll32:*)
  - Bash(rundll32.exe:*)
  - Bash(regsvr32:*)
  - Bash(regsvr32.exe:*)

  # The PowerShell tool itself (distinct from Bash). On Windows hosts Claude
  # Code exposes this as a first-class tool that bypasses Bash entirely, the
  # same way MCP tools do. Block wholesale.
  - PowerShell
  - PowerShell(*)

  # Build runners that dispatch to arbitrary targets.
  - Bash(make:*)
  - Bash(just:*)
  - Bash(task:*)
  - Bash(invoke:*)
  - Bash(nox:*)
  - Bash(tox:*)

  # Package managers. Wrapped as thin pass-throughs by coily so every
  # install / add / remove / run lands in the audit log and goes through
  # argv validation. The bare binaries are denied here so the agent can
  # only reach them via `coily <pkgmgr> ...`. bun is also denied above
  # under "scripting interpreters" - same prefix, one rule covers both.
  - Bash(npm:*)
  - Bash(pnpm:*)
  - Bash(yarn:*)
  - Bash(uv:*)
  - Bash(pip:*)
  - Bash(pipx:*)
  - Bash(poetry:*)
  - Bash(cargo:*)
  - Bash(gem:*)
  - Bash(bundle:*)
  - Bash(brew:*)

  # kubectl write verbs. These go through coily k8s, which policy-checks and
  # audits them.
  - Bash(kubectl apply:*)
  - Bash(kubectl create:*)
  - Bash(kubectl delete:*)
  - Bash(kubectl patch:*)
  - Bash(kubectl replace:*)
  - Bash(kubectl edit:*)
  - Bash(kubectl label:*)
  - Bash(kubectl annotate:*)
  - Bash(kubectl scale:*)
  - Bash(kubectl autoscale:*)
  - Bash(kubectl set:*)
  - Bash(kubectl taint:*)
  - Bash(kubectl cordon:*)
  - Bash(kubectl uncordon:*)
  - Bash(kubectl drain:*)
  - Bash(kubectl expose:*)
  - Bash(kubectl run:*)
  - Bash(kubectl rollout undo:*)
  - Bash(kubectl rollout pause:*)
  - Bash(kubectl rollout resume:*)
  - Bash(kubectl rollout restart:*)
  - Bash(kubectl exec:*)
  - Bash(kubectl port-forward:*)
  - Bash(kubectl cp:*)
  - Bash(kubectl attach:*)
  - Bash(kubectl proxy:*)
  - Bash(kubectl debug:*)
  - Bash(kubectl kustomize:*)

  # aws write verbs. Go through coily ops aws so argv validation + audit fires.
  # Read verbs are explicitly allowed above; this list covers the destructive
