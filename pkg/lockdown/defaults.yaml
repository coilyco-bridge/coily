# Canonical Claude Code permission rules that coily lockdown writes into a
# repo's .claude/settings.json. Expresses the allowlist inversion from the
# threat model: deny broadly at the scripting/shell/tool layer, allow narrowly
# at the coily layer plus read-only utilities.
#
# This file is embedded into the coily binary at build time. Changes require
# editing here, rebuilding, and sudo-installing. Same review gate as any code
# change.

allow:
  # coily itself is the kernel boundary.
  - Bash(coily:*)

  # Filesystem + search (read-only).
  - Bash(ls:*)
  - Bash(cat:*)
  - Bash(head:*)
  - Bash(tail:*)
  - Bash(wc:*)
  - Bash(file:*)
  - Bash(stat:*)
  - Bash(grep:*)
  - Bash(rg:*)
  - Bash(find:*)
  - Bash(tree:*)

  # git (read-only shapes). Write shapes (commit, push, reset, clean) require
  # an override in per-repo .claude/settings.local.json.
  - Bash(git status:*)
  - Bash(git log:*)
  - Bash(git diff:*)
  - Bash(git show:*)
  - Bash(git blame:*)
  - Bash(git branch:*)
  - Bash(git remote:*)
  - Bash(git ls-files:*)
  - Bash(git rev-parse:*)
  - Bash(git config --get:*)

  # kubectl read verbs. Write verbs go through coily ops kubectl.
  - Bash(kubectl get:*)
  - Bash(kubectl describe:*)
  - Bash(kubectl logs:*)
  - Bash(kubectl explain:*)
  - Bash(kubectl top:*)
  - Bash(kubectl api-resources:*)
  - Bash(kubectl api-versions:*)
  - Bash(kubectl version:*)
  - Bash(kubectl cluster-info:*)
  - Bash(kubectl config view:*)
  - Bash(kubectl config get-contexts:*)
  - Bash(kubectl config current-context:*)
  - Bash(kubectl auth can-i:*)
  - Bash(kubectl diff:*)
  - Bash(kubectl rollout status:*)
  - Bash(kubectl rollout history:*)
  - Bash(kubectl events:*)
  - Bash(kubectl wait:*)

  # aws read verbs. Write verbs go through coily ops aws. Enumerated rather
  # than wildcarded because Bash permission patterns are prefix-only -
  # there's no way to match "aws <service> describe-*" generically.
  # Intentionally NOT allowed bare:
  #   aws ssm get-parameter[s]   (--with-decryption can read secrets)
  #   aws lambda invoke          (executes arbitrary remote code)
  #   aws ecs run-task           (same; spawns containers)
  - Bash(aws sts get-caller-identity:*)
  - Bash(aws sts get-session-token:*)
  - Bash(aws s3 ls:*)
  - Bash(aws s3api head-bucket:*)
  - Bash(aws s3api head-object:*)
  - Bash(aws s3api list-buckets:*)
  - Bash(aws s3api list-objects-v2:*)
  - Bash(aws s3api list-object-versions:*)
  - Bash(aws s3api get-bucket-location:*)
  - Bash(aws s3api get-bucket-policy:*)
  - Bash(aws s3api get-bucket-tagging:*)
  - Bash(aws s3api get-bucket-versioning:*)
  - Bash(aws s3api get-object-tagging:*)
  - Bash(aws ec2 describe-instances:*)
  - Bash(aws ec2 describe-instance-types:*)
  - Bash(aws ec2 describe-security-groups:*)
  - Bash(aws ec2 describe-vpcs:*)
  - Bash(aws ec2 describe-subnets:*)
  - Bash(aws ec2 describe-availability-zones:*)
  - Bash(aws ec2 describe-regions:*)
  - Bash(aws ec2 describe-images:*)
  - Bash(aws ec2 describe-volumes:*)
  - Bash(aws ec2 describe-key-pairs:*)
  - Bash(aws ec2 describe-network-interfaces:*)
  - Bash(aws iam list-users:*)
  - Bash(aws iam list-roles:*)
  - Bash(aws iam list-attached-role-policies:*)
  - Bash(aws iam list-role-policies:*)
  - Bash(aws iam list-policies:*)
  - Bash(aws iam list-access-keys:*)
  - Bash(aws iam get-user:*)
  - Bash(aws iam get-role:*)
  - Bash(aws iam get-policy:*)
  - Bash(aws iam get-policy-version:*)
  - Bash(aws ssm describe-parameters:*)
  - Bash(aws ssm describe-instance-information:*)
  - Bash(aws ssm list-commands:*)
  - Bash(aws route53 list-hosted-zones:*)
  - Bash(aws route53 list-resource-record-sets:*)
  - Bash(aws route53 get-hosted-zone:*)
  - Bash(aws route53 get-change:*)
  - Bash(aws logs describe-log-groups:*)
  - Bash(aws logs describe-log-streams:*)
  - Bash(aws logs filter-log-events:*)
  - Bash(aws logs get-log-events:*)
  - Bash(aws cloudwatch list-metrics:*)
  - Bash(aws cloudwatch describe-alarms:*)
