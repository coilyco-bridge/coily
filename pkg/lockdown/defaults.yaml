# Canonical Claude Code permission rules that coily lockdown writes into a
# repo's .claude/settings.json. Expresses the allowlist inversion from the
# threat model: deny broadly at the scripting/shell/tool/privileged-binary
# layer, allow narrowly at the coily layer plus read-only utilities.
#
# Inversion notes for aws / kubectl / gh: Claude Code's Bash(prefix:*)
# permission syntax is prefix-only, so an enumerated read-allow list grew
# to 128 aws + 18 kubectl + 25 gh entries because there is no way to write
# Bash(aws * describe-*) generically. The inversion: drop all of those
# allows, deny the bare binaries entirely, and route every aws / kubectl /
# gh call through `coily ops <bin>`. The audit log becomes the
# system-of-record for those binaries, the prefix-only limitation stops
# mattering, and adding a new safe-shape never requires editing this file.
#
# This file is embedded into the coily binary at build time. Changes require
# editing here, rebuilding, and sudo-installing. Same review gate as any code
# change.

allow:
  # coily itself is the kernel boundary.
  - Bash(coily:*)

  # Filesystem + search (read-only).
  - Bash(ls:*)
  - Bash(cat:*)
  - Bash(head:*)
  - Bash(tail:*)
  - Bash(wc:*)
  - Bash(file:*)
  - Bash(stat:*)
  - Bash(grep:*)
  - Bash(rg:*)
  - Bash(find:*)
  - Bash(tree:*)

  # git (read-only shapes). Write shapes (commit, push, reset, clean) require
  # an override in per-repo .claude/settings.local.json.
  - Bash(git status:*)
  - Bash(git log:*)
  - Bash(git diff:*)
  - Bash(git show:*)
  - Bash(git blame:*)
  - Bash(git branch:*)
  - Bash(git remote:*)
  - Bash(git ls-files:*)
  - Bash(git rev-parse:*)
  - Bash(git config --get:*)

deny:
  # Scripting interpreters. Each of these can spawn a subprocess that runs
  # anything, which defeats prefix-based allowlisting.
  - Bash(python:*)
  - Bash(python3:*)
  - Bash(ruby:*)
  - Bash(perl:*)
  - Bash(node:*)
  - Bash(deno:*)
  - Bash(bun:*)
  - Bash(osascript:*)
  - Bash(go run:*)

  # Shells. Same problem. Disallow invoking them directly.
  - Bash(sh:*)
  - Bash(bash:*)
  - Bash(zsh:*)
  - Bash(fish:*)
  - Bash(dash:*)
  - Bash(ksh:*)
  - Bash(env:*)
  - Bash(exec:*)
  - Bash(xargs:*)

  # Windows shells. Same problem. Kai's primary host is Windows and Git Bash
  # can shell out to cmd/PowerShell, which gives arbitrary execution.
  - Bash(cmd:*)
  - Bash(cmd.exe:*)
  - Bash(powershell:*)
  - Bash(powershell.exe:*)
  - Bash(pwsh:*)
  - Bash(pwsh.exe:*)

  # Windows scripting hosts and LOLBAS execution vectors. Each can run
  # arbitrary scripts or load arbitrary DLLs, defeating prefix allowlisting.
  - Bash(wscript:*)
  - Bash(wscript.exe:*)
  - Bash(cscript:*)
  - Bash(cscript.exe:*)
  - Bash(mshta:*)
  - Bash(mshta.exe:*)
  - Bash(rundll32:*)
  - Bash(rundll32.exe:*)
  - Bash(regsvr32:*)
  - Bash(regsvr32.exe:*)

  # The PowerShell tool itself (distinct from Bash). On Windows hosts Claude
  # Code exposes this as a first-class tool that bypasses Bash entirely, the
  # same way MCP tools do. Block wholesale.
  - PowerShell
  - PowerShell(*)

  # Build runners that dispatch to arbitrary targets.
  - Bash(make:*)
  - Bash(just:*)
  - Bash(task:*)
  - Bash(invoke:*)
  - Bash(nox:*)
  - Bash(tox:*)

  # Package managers. Wrapped as thin pass-throughs by coily so every
  # install / add / remove / run lands in the audit log and goes through
  # argv validation. The bare binaries are denied here so the agent can
  # only reach them via `coily pkg <pkgmgr> ...`. bun is also denied above
  # under "scripting interpreters" - same prefix, one rule covers both.
  - Bash(npm:*)
  - Bash(pnpm:*)
  - Bash(yarn:*)
  - Bash(uv:*)
  - Bash(pip:*)
  - Bash(pipx:*)
  - Bash(poetry:*)
  - Bash(cargo:*)
  - Bash(gem:*)
  - Bash(bundle:*)
  - Bash(brew:*)

  # Privileged-op binaries. Same shape as the package-manager block above:
  # bare invocation is denied so the agent can only reach them via
  # `coily ops <bin>`, which adds argv validation + audit + (for kubectl)
  # context routing. The previous design enumerated read-verb allows and
  # write-verb denies separately because Claude Code's Bash(prefix:*) syntax
  # cannot pattern-match `aws * describe-*`; that meant every safe shape
  # had to be hand-listed. Inverting to a single deny per binary collapses
  # ~170 lines and makes the audit log the system-of-record for every aws,
  # kubectl, and gh call.
  - Bash(aws:*)
  - Bash(kubectl:*)
  - Bash(gh:*)
  - Bash(flyctl:*)

  # docker. No image builds or container execs from the agent layer.
  - Bash(docker:*)

  # tailscale. All ops go through coily tailscale.
  - Bash(tailscale:*)

  # ssh/scp/rsync broad. Named-host access goes through coily (eco, k8s).
  - Bash(ssh:*)
  - Bash(scp:*)
  - Bash(rsync:*)
  - Bash(sshfs:*)

  # helm, terraform, gcloud. Not in v1 scope for coily, so out entirely.
  - Bash(helm:*)
  - Bash(terraform:*)
  - Bash(gcloud:*)
  - Bash(tflint:*)
  - Bash(tfsec:*)

  # git destructive shapes. Reset/clean/checkout-to-discard/push-force should
  # never be auto-approved.
  - Bash(git reset --hard:*)
  - Bash(git clean -fd:*)
  - Bash(git push --force:*)
  - Bash(git push -f:*)
