# coily embedded config - mirror of /config.example.yaml.
# The Makefile copies /config.yaml into pkg/config/config.yaml before build so
# //go:embed can reach it. This file exists as a committed placeholder; the
# gitignored pkg/config/config.yaml is what actually gets embedded.
#
# log_path defaults to ~/.coily/audit/<owner>-<repo>.jsonl, derived from
# `git remote get-url origin`. See pkg/config/paths.go.

kai_server:
  tailscale_host: kai-server
  ssh_user: kai

audit:
  # log_path: ""   # blank picks the per-repo default under ~/.coily/audit/
  # Rotation. 10MB per file, keep 10 backups or 30 days (whichever hits first).
  max_size_mb: 10
  max_backups: 10
  max_age_days: 30
  compress: false

aws:
  profile: default

eco:
  # Local checkout of eco-configs. Used by `coily eco world` verbs. Empty
  # means --configs-dir is required on every invocation.
  configs_dir: ""
  # Absolute path to the Eco dedicated server install on kai-server. Used
  # by `coily eco mod install`. Defaults to the Steam install location.
  server_dir: "/home/kai/Steam/steamapps/common/EcoServer"
